name: Build & Release GiftQuest

on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Read version
        id: ver
        run: |
          VERSION_CODE=$(sed -n '1p' version.txt | tr -d '[:space:]')
          VERSION_NAME=$(sed -n '2p' version.txt | tr -d '[:space:]')
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> local.properties
          echo "CLOUDINARY_CLOUD=${{ secrets.CLOUDINARY_CLOUD }}" >> local.properties
          echo "CLOUDINARY_PRESET=${{ secrets.CLOUDINARY_PRESET }}" >> local.properties
          echo "WEB_CLIENT_ID=${{ secrets.WEB_CLIENT_ID }}" >> local.properties

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/giftquest-release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug
        env:
            KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
            KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Find APK
        id: apk
        run: |
            APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
            APK_NAME=$(basename "$APK_PATH")
            echo "path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          NEW_VERSION=$(cat version.txt | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git diff --staged --quiet || git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          name: "GiftQuest v${{ steps.ver.outputs.name }}"
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true